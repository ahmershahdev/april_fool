<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Secure Gateway - April Fools Day</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤡</text></svg>">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="floating-orbs"></div>

    <div class="login-card" id="main-content">
        <div class="brand-header">
            <h1 class="brand-name">AHMER SHAH</h1>
            <p class="brand-subtitle">Secure Gateway Premium</p>
        </div>

        <div id="form-ui">
            <div class="field-zone">
                <div class="shy-wrapper" id="username-wrap">
                    <input type="text" class="form-control premium-input" placeholder="Username" id="username" disabled required
                        autocomplete="off">
                </div>
            </div>

            <div class="field-zone">
                <div class="shy-wrapper" id="email-wrap">
                    <input type="email" class="form-control premium-input" placeholder="Email Address" id="email" required
                        disabled autocomplete="off">
                </div>
            </div>

            <div class="field-zone">
                <div class="shy-wrapper" id="pass-wrap">
                    <input type="password" class="form-control premium-input" placeholder="Password" id="password" required
                        disabled autocomplete="off">
                </div>
            </div>

            <button class="btn-login premium-btn" id="login-btn">LOGIN</button>

            <button id="stabilize-btn" class="helper-btn primary-helper">Stabilize System</button>
            <button id="stop-shit-btn" class="helper-btn danger-helper">Stop This</button>

            <div class="copyright">
                &copy; 2026 Ahmer Shah. All Rights Reserved.
            </div>
        </div>

        <div id="status-box">
            <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
            <h5 id="status-text">Initializing Secure Tunnel...</h5>
        </div>

        <div class="shiny-flare" id="shiny-flare"></div>
    </div>

    <audio id="joke-audio">
        <source src="login.mp3" type="audio/mp3">
    </audio>

    <script src="script.js" defer></script>
</body>

</html>
